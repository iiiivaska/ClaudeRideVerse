name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-packages:
    name: SPM tests — ${{ matrix.package }}
    runs-on: macos-15
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        package: [HexKit, MapVerse, LocationKit, DesignSystem, PersistenceCore]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Cache SPM build
        uses: actions/cache@v4
        with:
          path: Packages/${{ matrix.package }}/.build
          key: spm-${{ matrix.package }}-${{ runner.os }}-${{ hashFiles(format('Packages/{0}/Package.resolved', matrix.package), format('Packages/{0}/Package.swift', matrix.package)) }}
          restore-keys: |
            spm-${{ matrix.package }}-${{ runner.os }}-

      - name: swift test
        working-directory: Packages/${{ matrix.package }}
        run: swift test

  build-app:
    name: App target compiles
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: xcodebuild -version

      # RideVerse.xcodeproj references RideVerse/Secrets.xcconfig via
      # baseConfigurationReference. The file is gitignored (contains a real
      # API key for local dev), so CI must create a placeholder before build.
      # If a `STADIA_API_KEY` GitHub Actions secret is configured, we use it;
      # otherwise the build compiles with an empty key — runtime map rendering
      # won't work in CI artifacts, but compilation succeeds which is what CI
      # verifies. See RideVerse/Secrets.xcconfig.example for the template.
      - name: Create Secrets.xcconfig for build
        env:
          STADIA_API_KEY: ${{ secrets.STADIA_API_KEY }}
        run: |
          cat > RideVerse/Secrets.xcconfig <<EOF
          // Auto-generated in CI — do not rely on this content locally.
          STADIA_API_KEY = ${STADIA_API_KEY:-ci-placeholder-no-tiles}
          EOF

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: spm-workspace-${{ runner.os }}-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            spm-workspace-${{ runner.os }}-

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -workspace RideVerse.xcworkspace \
            -scheme RideVerse

      - name: Build app target
        run: |
          xcodebuild build \
            -workspace RideVerse.xcworkspace \
            -scheme RideVerse \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO
