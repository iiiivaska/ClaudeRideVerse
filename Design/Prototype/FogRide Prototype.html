// ── TOKENS ────────────────────────────────────────────────────
const T = {
  bg:'#000',bg1:'#1C1C1E',bg2:'#2C2C2E',bg3:'#3A3A3C',
  sep:'rgba(255,255,255,0.08)',sepS:'rgba(255,255,255,0.14)',
  tp:'#fff',ts:'rgba(235,235,245,0.80)',tt:'rgba(235,235,245,0.55)',tq:'rgba(235,235,245,0.28)',
  acc:'#0A84FF',accS:'rgba(10,132,255,0.15)',accB:'rgba(10,132,255,0.35)',
  green:'#30D158',greenS:'rgba(48,209,88,0.12)',
  red:'#FF453A',orange:'#FF9F0A',yellow:'#FFD60A',
  glass:'rgba(22,22,24,0.86)',glassB:'rgba(255,255,255,0.10)',
  sans:"'DM Sans',sans-serif",mono:"'IBM Plex Mono',monospace",
};

const hexPts=(cx,cy,r)=>Array.from({length:6},(_,i)=>{
  const a=Math.PI/180*(60*i-30);
  return `${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;
}).join(' ');

  <span style={{fontFamily:T.mono,fontSize:9,fontWeight:500,letterSpacing:'0.12em',textTransform:'uppercase',color:T.tq,...style}}>{children}</span>
);
const MonoVal=({children,color=T.tp,size=22,style={}})=>(

);
const SectionLabel=({children})=>(

// ── HEX MAP VISUALIZATION ─────────────────────────────────────
function HexMapBg({width=402,height=874,showTrack=false}){
  const cols=20,hw=22,hh=20;
  // Explored cluster centered around col 10, row 9
  const expl=new Set();
  [[10,9],[9,9],[11,9],[10,8],[9,8],[11,8],[10,10],[9,10],[8,9],[12,9],[10,7],[9,7],[8,8],[11,7],[12,8],[8,10],[12,10],[7,9],[13,9],[10,11],[9,11],[8,11],[11,10],[7,10],[11,11],[6,9],[13,10],[10,6],[8,6],[12,6]].forEach(([c,r])=>expl.add(r*cols+c));
  const newH=new Set([[13,11],[14,10]].map(([c,r])=>r*cols+c));
  const rows=Math.ceil(height/(hh*0.78))+1;
  const cells=[];
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const idx=r*cols+c;
    if(expl.has(idx)||newH.has(idx))cells.push({idx,r,c,state:newH.has(idx)?'new':'ex'});
  }
  return(
    <svg width={width} height={height} style={{position:'absolute',inset:0,display:'block'}}>
      <rect width={width} height={height} fill="#0B1118"/>
      <ellipse cx={width*0.2} cy={height*0.55} rx="90" ry="60" fill="#101A12" opacity="0.9"/>
      <ellipse cx={width*0.78} cy={height*0.3} rx="70" ry="50" fill="#101A12" opacity="0.7"/>
      <path d={`M0,${height*0.44} C${width*0.3},${height*0.41} ${width*0.6},${height*0.46} ${width},${height*0.43}`} stroke="#1E2530" strokeWidth="3" fill="none"/>
      <path d={`M${width*0.42},0 C${width*0.44},${height*0.4} ${width*0.38},${height*0.7} ${width*0.4},${height}`} stroke="#1E2530" strokeWidth="2" fill="none"/>
      <path d={`M0,${height*0.72} C${width*0.4},${height*0.70} ${width*0.7},${height*0.74} ${width},${height*0.71}`} stroke="#111A24" strokeWidth="10" fill="none" opacity="0.8"/>
      <rect width={width} height={height} fill="rgba(0,0,0,0.76)"/>
      {cells.map(({idx,r,c,state})=>{
        const x=c*hw+(r%2===1?hw/2:0)+2,y=r*(hh*0.78)+2;
        const pts=hexPts(x+hw/2,y+hh/2,9);
        return(
          <g key={idx}>
            <polygon points={pts} fill={state==='new'?`${T.acc}88`:`${T.acc}38`} stroke={state==='new'?T.acc:`${T.acc}77`} strokeWidth={state==='new'?1:0.6}/>
            {state==='new'&&<polygon points={pts} fill="none" stroke={`${T.acc}25`} strokeWidth="6"/>}
          </g>
        );
      })}
      {showTrack&&<>
        <polyline points={`${width*0.15},${height*0.72} ${width*0.25},${height*0.60} ${width*0.36},${height*0.55} ${width*0.48},${height*0.49} ${width*0.55},${height*0.47}`} fill="none" stroke={`${T.acc}44`} strokeWidth="7" strokeLinecap="round" strokeLinejoin="round"/>
        <polyline points={`${width*0.15},${height*0.72} ${width*0.25},${height*0.60} ${width*0.36},${height*0.55} ${width*0.48},${height*0.49} ${width*0.55},${height*0.47}`} fill="none" stroke={T.acc} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        <circle cx={width*0.15} cy={height*0.72} r="5" fill={T.green} stroke="white" strokeWidth="1.5"/>
      </>}
      <circle cx={width*0.55} cy={height*0.47} r="20" fill={`${T.acc}15`}/>
      <circle cx={width*0.55} cy={height*0.47} r="8" fill={T.acc} stroke="white" strokeWidth="2.5"/>
    </svg>
  );
}

function Sparkline({pts}){

  profile:(c)=><svg width="22" height="22" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,

// ── ONBOARDING ────────────────────────────────────────────────
const OB=[
  {type:'hex',title:"Discover where\nyou've ridden",sub:"FogRide turns every ride into exploration. Cover the map, hex by hex.",cta:"Get started",link:"I have an account"},
  {type:'location',title:"Show your rides\non the map",sub:"We need your location to record GPS tracks during rides. Your data stays on your device.",cta:"Allow location access",link:"Not now"},
  {type:'motion',title:"Auto-pause when\nyou stop",sub:"Detect when you stop or resume riding. Never miss a moment of your journey.",cta:"Allow motion access",link:"Not now"},
  {type:'health',title:"Sync with\nApple Health",sub:"Save your workouts automatically and monitor your heart rate during rides.",cta:"Allow Health access",link:"Not now"},
];

function HexIllo(){
  // Pointy-top hex tessellation: dx = r*sqrt(3), dy = r*1.5, odd rows offset by dx/2
  const r=19;
  const dx=r*Math.sqrt(3);
  const dy=r*1.5;
  const cx0=95, cy0=92;
  // axial-ish offsets (col, row) forming a filled hex flower (radius 2)
  const grid=[
    [0,-2],
    [-1,-1],[0,-1],[1,-1],
    [-2,0],[-1,0],[0,0],[1,0],[2,0],
    [-1,1],[0,1],[1,1],
    [0,2],
  ];
  const layout=grid.map(([c,r2])=>{
    const xOff=(r2%2!==0)?dx/2:0;
    // To keep a symmetric pattern, offset alternating rows; here rows -1 and 1 get shifted
    const x=cx0+c*dx+(r2%2===0?0:dx/2*(r2>0?-1:-1));
    const y=cy0+r2*dy;
    return [x,y];
  });
  // Rebuild cleanly: symmetric honeycomb, 3 rows of 3, with extras top/bottom
  const hexes=[];
  // row -2: 1 hex
  hexes.push([cx0, cy0-2*dy]);
  // row -1: 2 hexes (offset)
  hexes.push([cx0-dx/2, cy0-dy]);
  hexes.push([cx0+dx/2, cy0-dy]);
  // row -1 extras on sides? keep 3 rows in middle
  hexes.push([cx0-3*dx/2, cy0-dy]);
  hexes.push([cx0+3*dx/2, cy0-dy]);
  // row 0: 3 hexes (center row)
  hexes.push([cx0-dx, cy0]);
  hexes.push([cx0, cy0]);
  hexes.push([cx0+dx, cy0]);
  // row 1: 4 hexes
  hexes.push([cx0-3*dx/2, cy0+dy]);
  hexes.push([cx0-dx/2, cy0+dy]);
  hexes.push([cx0+dx/2, cy0+dy]);
  hexes.push([cx0+3*dx/2, cy0+dy]);
  // row 2: 1 hex
  hexes.push([cx0, cy0+2*dy]);

  // "lit" hexes — the discovered/explored cluster (center + some neighbors)
  const lit=[0,1,2,5,6,7,9,10,11,12];
  return(
    <svg width="190" height="190" viewBox="0 0 190 190" style={{filter:'drop-shadow(0 0 30px rgba(10,132,255,0.25))'}}>
      <radialGradient id="hg" cx="50%" cy="50%" r="55%">
        <stop offset="0%" stopColor={T.acc} stopOpacity="0.22"/>
        <stop offset="100%" stopColor={T.acc} stopOpacity="0"/>
      </radialGradient>
      <ellipse cx="95" cy="95" rx="82" ry="72" fill="url(#hg)"/>
      {hexes.map(([x,y],i)=>{
        const l=lit.includes(i);
        const pts=hexPts(x,y,r-0.6);
        return(
          <g key={i} style={{animation:`hexGlow ${1.8+i*0.22}s ease-in-out infinite`,animationDelay:`${i*0.16}s`}}>
            <polygon points={pts} fill={l?`${T.acc}30`:'rgba(44,44,46,0.8)'} stroke={l?`${T.acc}cc`:'rgba(80,80,84,0.5)'} strokeWidth="1"/>
            {l&&<polygon points={pts} fill="none" stroke={`${T.acc}18`} strokeWidth="6"/>}
          </g>
        );
      })}
    </svg>
  );
}

function OBIcon({type}){
  const map={
    location:{bg:T.accS,border:T.accB,stroke:T.acc,path:<><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></>},
    motion:{bg:T.accS,border:T.accB,stroke:T.acc,path:<><circle cx="12" cy="5" r="2.5"/><path d="M12 7.5v5.5l3 3M9.5 13L7 17M14.5 13L17 17"/><path d="M9 8C7 9 6 12 7 14"/></>},
    health:{bg:'rgba(255,69,58,0.12)',border:'rgba(255,69,58,0.35)',stroke:T.red,path:<><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></>},
  };
  const m=map[type];
  return(
    <div style={{width:88,height:88,borderRadius:24,background:m.bg,border:`1px solid ${m.border}`,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <svg width="44" height="44" fill="none" stroke={m.stroke} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24">{m.path}</svg>
    </div>
  );
}

function OnboardingScreen({onDone}){
  const [page,setPage]=useState(()=>parseInt(localStorage.getItem('fr_ob_page')||'0'));
  useEffect(()=>{localStorage.setItem('fr_ob_page',page);},[page]);
  const ob=OB[page];
  const next=()=>{if(page<OB.length-1)setPage(p=>p+1);else onDone();};
  return(
    <div style={{width:'100%',height:'100%',background:T.bg,display:'flex',flexDirection:'column',alignItems:'center',overflow:'hidden'}}>
      {/* illustration */}
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',minHeight:0}}>
        {ob.type==='hex'?<HexIllo/>:<OBIcon type={ob.type}/>}
      </div>
      {/* bottom */}
      <div style={{padding:'0 28px 44px',width:'100%',display:'flex',flexDirection:'column',alignItems:'center'}}>
        {/* dots */}
        <div style={{display:'flex',gap:6,marginBottom:28,alignItems:'center'}}>
          {OB.map((_,i)=>(
            <div key={i} style={{width:i===page?18:6,height:6,borderRadius:100,background:i===page?T.acc:T.tq,transition:'all 0.25s'}}/>
          ))}
        </div>
        <h1 style={{fontFamily:T.sans,fontSize:26,fontWeight:700,color:T.tp,textAlign:'center',lineHeight:1.18,marginBottom:12,whiteSpace:'pre-line'}}>{ob.title}</h1>
        <p style={{fontFamily:T.sans,fontSize:14,color:T.ts,textAlign:'center',lineHeight:1.6,marginBottom:28,maxWidth:290}}>{ob.sub}</p>
        <Btn onClick={next} style={{boxShadow:`0 4px 28px ${T.acc}44`,marginBottom:12}}>{ob.cta}</Btn>
        <button onClick={next} style={{background:'none',border:'none',fontFamily:T.sans,fontSize:13,color:T.tt,cursor:'pointer',padding:8}}>{ob.link}</button>
      </div>
    </div>
  );
}

// ── MAP SCREEN ────────────────────────────────────────────────
function MapScreen({onStartRide}){
  return(
    <div style={{width:'100%',height:'100%',position:'relative',overflow:'hidden'}}>
      <HexMapBg width={402} height={874}/>
      {/* subtle dot grid */}
      <div style={{position:'absolute',inset:0,backgroundImage:`linear-gradient(rgba(255,255,255,0.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.012) 1px,transparent 1px)`,backgroundSize:'8px 8px',pointerEvents:'none'}}/>
      {/* top floating controls */}

function RecordingScreen({onStop}){
  const [sec,setSec]=useState(0);
  const [spd,setSpd]=useState(24.7);
  const [hex,setHex]=useState(47);
  const [km,setKm]=useState(18.3);
  useEffect(()=>{
    const t=setInterval(()=>{
      setSec(s=>s+1);
      setSpd(s=>Math.max(8,Math.min(42,+(s+(Math.random()-0.44)*1.1).toFixed(1))));
      setKm(d=>+(d+0.004).toFixed(3));
      if(Math.random()<0.025)setHex(h=>h+1);
    },1000);
    return()=>clearInterval(t);
  },[]);
  const fmt=s=>`${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor(s%3600/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

// ── APP ROOT ──────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState(()=>localStorage.getItem('fr_scr')||'onboarding');
  const [tab,setTab]=useState(()=>localStorage.getItem('fr_tab')||'map');
  const [modal,setModal]=useState(null);
  useEffect(()=>{localStorage.setItem('fr_scr',screen);},[screen]);
  useEffect(()=>{localStorage.setItem('fr_tab',tab);},[tab]);

  const tabContent={
    map:<MapScreen onStartRide={()=>setModal('rec')}/>,
    rides:<RidesScreen onDetail={()=>setModal('detail')}/>,
    stats:<StatsScreen/>,
    profile:<ProfileScreen onUpgrade={()=>setModal('paywall')}/>,
  };

  return(
    <IOSDevice dark width={402} height={874}>
      <div style={{position:'relative',width:'100%',height:'100%',background:T.bg,overflow:'hidden'}}>
        {screen==='onboarding'
          ?<OnboardingScreen onDone={()=>setScreen('main')}/>
          :<>
            {modal==='rec' ? <RecordingScreen onStop={()=>setModal('summary')}/> : tabContent[tab]}
            <TabBar active={tab} onTab={setTab}/>
            {modal==='summary'&&<div style={{position:'absolute',inset:0,zIndex:150}}><TripSummaryScreen onDetails={()=>setModal('detail')} onDiscard={()=>setModal(null)}/></div>}
            {modal==='detail'&&<div style={{position:'absolute',inset:0,zIndex:150}}><TripDetailScreen onBack={()=>setModal(null)}/></div>}
            {modal==='paywall'&&<PaywallScreen onClose={()=>setModal(null)}/>}
          </>
        }
      </div>
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
